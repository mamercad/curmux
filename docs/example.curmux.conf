# Example .curmux.conf — left column: nvim (70%×70%) + lazygit (70%×30%);
# right column: agent (30%×100%). See docs/curmux-conf-plan.md.
# This matches the layout in the repo root .curmux.conf.
name: curmux

rows:
  - size: 70%
    panes:
      - title: nvim
        command: nvim
        size: 70%
      - title: Agent
        command: agent
        size: 30%
        row_span: 2
        focus: true   # initial focus when you attach (optional; default: first pane)
  - size: 30%
    panes:
      - title: lazygit
        command: lazygit
        size: 70%
