---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install ruff pytest
          sudo apt-get update && sudo apt-get install -y tmux

      - name: Lint
        run: ruff check curmux && ruff format --check curmux

      - name: Syntax check
        run: python3 -c "import ast; ast.parse(open('curmux').read())"

      - name: Test
        run: python3 -m pytest tests/ -v

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk '/^## \[${{ steps.version.outputs.version }}\]/{found=1; next} /^## \[/{found=0} found' \
            CHANGELOG.md > /tmp/release-notes.md
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-notes.md >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "curmux v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            curmux
            install.sh
          make_latest: true
