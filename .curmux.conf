# curmux layout: left column (70%) = nvim top (70% height) + lazygit bottom (30% height);
# right column (30%) = agent (100% height). See docs/curmux-conf-plan.md.
name: curmux

rows:
  - size: 70%
    panes:
      - title: nvim
        command: nvim
        size: 70%
      - title: Agent
        command: agent
        size: 30%
        row_span: 2
        focus: true
  - size: 30%
    panes:
      - title: lazygit
        command: lazygit
        size: 70%
